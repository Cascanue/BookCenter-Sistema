<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Book Center - Registrar Cliente</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contenedor-modulo { max-width: 600px; margin: 3rem auto; }
        .fila-doble { display: flex; gap: 1rem; }
        .fila-doble .input-grupo { flex: 1; }
        
        /* Ventanita de éxito emergente */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-contenido {
            background: white; padding: 2rem; border-radius: 12px;
            text-align: center; max-width: 400px; width: 100%;
        }
        .icono-check { font-size: 4rem; color: #22c55e; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header class="encabezado">
    <div class="zona-izquierda">
        <a href="/menu" class="btn-salir">Volver al Menú</a>
    </div>
    
    <img src="https://res.cloudinary.com/dwk77ddoq/image/upload/v1781397979/imagen_2026-06-13_194618193_hkz2d2.png" alt="Logo" class="logo-header">
    
    <div class="zona-derecha">
        <span style="font-weight: bold; color: var(--blanco);">Módulo Ventas</span>
    </div>
</header>

    <div class="contenedor-modulo">
        <div class="tarjeta">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Registrar Nuevo Cliente</h2>
            
            <form id="formRegistroCliente">
                <div class="fila-doble">
                    <div class="input-grupo" style="flex: 0.4;">
                        <label>Documento</label>
                        <select id="tipoDoc" class="input-moderno">
                            <option value="DNI">DNI</option>
                            <option value="RUC">RUC</option>
                        </select>
                    </div>
                    <div class="input-grupo" style="flex: 1;">
                        <label>N° de Documento</label>
                        <input type="text" id="numDoc" class="input-moderno" placeholder="Ingrese dígitos" required 
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                </div>

                <div class="fila-doble">
                    <div class="input-grupo">
                        <label>Nombres</label>
                        <input type="text" id="nombres" class="input-moderno" placeholder="Ej. Yair Asael..." required maxlength="50"
                               oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')">
                    </div>
                    <div class="input-grupo">
                        <label>Apellido Paterno</label>
                        <input type="text" id="apellidoPaterno" class="input-moderno" placeholder="Ej. Vasquez" required maxlength="50"
                               oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')">
                    </div>
                    <div class="input-grupo">
                        <label>Apellido Materno</label>
                        <input type="text" id="apellidoMaterno" class="input-moderno" placeholder="Ej. Marquina" required maxlength="50"
                               oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')">
                    </div>
                </div>

                <div class="fila-doble">
                    <div class="input-grupo">
                        <label>Teléfono</label>
                        <input type="text" id="telefono" class="input-moderno" placeholder="9 dígitos" required maxlength="9"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                    <div class="input-grupo">
                        <label>Correo Electrónico</label>
                        <input type="email" id="correo" class="input-moderno" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-principal" style="margin-top: 1rem;">Guardar Cliente</button>
            </form>
        </div>
    </div>

    <div id="modalExito" class="modal-overlay oculto">
        <div class="modal-contenido">
            <div class="icono-check">✓</div>
            <h2 style="margin-bottom: 1rem;">¡Usuario Guardado!</h2>
            <p style="color: var(--gris); margin-bottom: 1.5rem;">Los datos del cliente se han registrado correctamente en el sistema.</p>
        <div id="botonesModalExito" style="display: flex; flex-direction: column; gap: 10px;">                  <button type="button" class="btn-principal" onclick="agregarNuevo()">Agregar nuevo cliente</button>
                <button type="button" class="btn-principal" style="background: var(--gris); box-shadow: none;" onclick="window.location.href='/menu'">Regresar al menú</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>

    <script>
        // Lógica de Protección de Ruta (Evitar intrusos)
        const usuarioActual = getUsuario();
        const rolActual = usuarioActual ? usuarioActual.nombre_rol?.toLowerCase() : null;
        if (!usuarioActual) { cerrarSesion(); }
        else if (rolActual === 'cajero') {
            alert("Acceso denegado: Los cajeros no pueden registrar clientes.");
            window.location.href = '/menu';
        }
        // Lógica de Validación de Documento (8 para DNI, 11 para RUC)
        const tipoDoc = document.getElementById('tipoDoc');
        const numDoc = document.getElementById('numDoc');

        function actualizarValidacionDoc() {
            // Usamos setAttribute para ambos límites: asignar numDoc.maxLength
            // lanza una excepción si el nuevo máximo es menor que el minlength
            // vigente (ej. volver de RUC a DNI), lo que dejaba el campo en modo RUC.
            const longitud = tipoDoc.value === 'DNI' ? '8' : '11';
            numDoc.setAttribute('minlength', longitud);
            numDoc.setAttribute('maxlength', longitud);
            numDoc.placeholder = `${longitud} dígitos`;
            numDoc.value = ""; // Limpiar al cambiar
        }

        tipoDoc.addEventListener('change', actualizarValidacionDoc);
        actualizarValidacionDoc(); // Ejecutar al cargar

        // ==============================================================
        // LÓGICA INTELIGENTE: Detectar si venimos de Registrar Pedido
        // ==============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const origen = urlParams.get('origen');

        if (origen === 'pedido') {
            // 1. Cambiamos los botones de la ventanita de éxito
            const contenedorBotones = document.getElementById('botonesModalExito');
            contenedorBotones.innerHTML = `
                <button type="button" class="btn-principal" onclick="window.location.href='registrar-pedido.html'" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class='bx bx-cart'></i> Volver al Pedido
                </button>
            `;

            // 2. EXTRA (UX): Cambiamos también el botón superior izquierdo para que no diga "Volver al Menú"
            const btnSuperior = document.querySelector('.zona-izquierda .btn-salir');
            if (btnSuperior) {
                btnSuperior.href = "registrar-pedido.html";
                btnSuperior.innerHTML = "<i class='bx bx-arrow-back'></i> Volver al Pedido";
            }
        }

        // Control del envío del formulario a la Base de Datos Real

document.getElementById('formRegistroCliente').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // 1. Validar teléfono (mismas reglas que el panel de administración:
    // 9 dígitos y debe comenzar con 9, formato de celular peruano)
    const telefono = document.getElementById('telefono').value.trim();
    if (!/^9\d{8}$/.test(telefono)) {
        alert("El teléfono debe tener exactamente 9 dígitos y comenzar con 9.");
        return;
    }

    // Validación estricta de longitud de documento
    const tipoDocSeleccionado = document.getElementById('tipoDoc').value;
    const numDocValor = document.getElementById('numDoc').value.trim();

    if (tipoDocSeleccionado === 'DNI' && numDocValor.length !== 8) {
        alert("El DNI debe tener exactamente 8 dígitos.");
        return;
    }
    if (tipoDocSeleccionado === 'RUC' && numDocValor.length !== 11) {
        alert("El RUC debe tener exactamente 11 dígitos.");
        return;
    }

    // Nombres y apellidos: solo letras y mínimo 2 caracteres
    const nombres = document.getElementById('nombres').value.trim();
    const apellidoPaterno = document.getElementById('apellidoPaterno').value.trim();
    const apellidoMaterno = document.getElementById('apellidoMaterno').value.trim();
    const soloLetras = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;
    if (nombres.length < 2 || !soloLetras.test(nombres)) { alert("Los nombres solo deben contener letras (mínimo 2 caracteres)."); return; }
    if (apellidoPaterno.length < 2 || !soloLetras.test(apellidoPaterno)) { alert("El apellido paterno solo debe contener letras (mínimo 2 caracteres)."); return; }
    if (apellidoMaterno.length < 2 || !soloLetras.test(apellidoMaterno)) { alert("El apellido materno solo debe contener letras (mínimo 2 caracteres)."); return; }

    // Correo: mismo criterio que el panel de administración
    const correo = document.getElementById('correo').value.trim();
    if (!/^[^\s@]+@[^\s@]+\.com$/i.test(correo)) {
        alert("El correo debe ser válido y terminar en .com");
        return;
    }

    // 2. Armar el paquete de datos con las 3 casillas nuevas
    const datosCliente = {
        tipoDoc: tipoDocSeleccionado,
        numDoc: numDocValor,
        nombres: nombres,
        apellidoPaterno: apellidoPaterno,
        apellidoMaterno: apellidoMaterno,
        telefono: telefono,
        correo: correo,
        idCreador: getUsuario()?.id_usuario
    };

    // 3. Enviar al Backend
    try {
        const respuesta = await apiFetch('/api/registrar-cliente', {
            method: 'POST',
            body: JSON.stringify(datosCliente)
        });

        const resultado = await respuesta.json();

        if (resultado.exito) {
            // Si el backend dice OK, mostramos tu ventanita verde
            document.getElementById('modalExito').classList.remove('oculto');
        } else {
            alert("❌ " + resultado.mensaje); // Ejemplo: "Este documento ya está registrado"
        }
    } catch (error) {
        alert("❌ Error de comunicación con el servidor.");
    }
});

        // Función para el botón "Agregar nuevo cliente"
        function agregarNuevo() {
            document.getElementById('formRegistroCliente').reset();
            document.getElementById('modalExito').classList.add('oculto');
            actualizarValidacionDoc(); // Resetear las reglas del input
        }
    </script>
</body>
</html>
